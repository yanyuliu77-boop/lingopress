name: Publish daily LingoPress edition

on:
  schedule:
    - cron: "30,50 22 * * *"
    - cron: "10 23 * * *"
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: daily-lingopress-edition
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out the site
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build today's close-reading edition
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/publish_daily.py

      - name: Commit a new edition when generated
        run: |
          if git diff --quiet; then
            echo "Today's edition already exists."
            exit 0
          fi
          git config user.name "LingoPress Daily Editor"
          git config user.email "actions@users.noreply.github.com"
          git add content/articles.js assets/
          git commit -m "Publish daily LingoPress edition"
          git push
